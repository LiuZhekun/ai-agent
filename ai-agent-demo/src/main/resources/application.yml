# ============================================================================
# AI Agent Demo - 通用配置
# ============================================================================
# 本文件包含所有不区分 LLM 提供商的通用配置。
# LLM 相关配置（API Key / 模型）请见 application-dashscope.yml 或 application-deepseek.yml。
#
# 配置优先级：环境变量 > 本文件中 ${ENV_VAR:默认值} 的默认值
# 如无特殊需求，使用默认值即可直接启动。
# ============================================================================

# --------------------------------------------------------------------------
# 一、服务基础配置
# --------------------------------------------------------------------------
server:
  port: ${SERVER_PORT:8080}                  # 后端 HTTP 端口，前端默认请求此端口

spring:
  application:
    name: ai-agent-demo

  # --------------------------------------------------------------------------
  # 二、MySQL 数据库
  # --------------------------------------------------------------------------
  # 存储业务数据（用户、部门、字典等）。
  # 默认连接本机 Docker 中的 MySQL，库名 ai_agent，账号密码 root/root。
  # 如需修改，通过环境变量覆盖即可，不要直接改此文件。
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/ai_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # --------------------------------------------------------------------------
  # 三、Redis
  # --------------------------------------------------------------------------
  # 用于会话管理和对话短期记忆存储。
  # 默认连接本机 Docker 中的 Redis，无密码。
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}              # 默认无密码；生产环境务必设置

  # --------------------------------------------------------------------------
  # 四、Milvus 向量数据库
  # --------------------------------------------------------------------------
  # 用于 RAG（检索增强生成）能力，将业务数据向量化后进行语义检索。
  # 默认连接本机 Docker 中的 Milvus。
  # 如果你不需要向量检索功能，Milvus 容器可以不启动，但启动后端时可能会打印连接警告。
  ai:
    vectorstore:
      milvus:
        client:
          host: ${MILVUS_HOST:127.0.0.1}
          port: ${MILVUS_PORT:19530}
        database-name: ${MILVUS_DATABASE:default}
        collection-name: ${MILVUS_COLLECTION:ai_agent_knowledge}
        embedding-dimension: ${MILVUS_EMBEDDING_DIMENSION:1024}
        index-type: ${MILVUS_INDEX_TYPE:IVF_FLAT}          # 索引类型：IVF_FLAT / HNSW / FLAT
        metric-type: ${MILVUS_METRIC_TYPE:COSINE}           # 距离度量：COSINE / L2 / IP
        initialize-schema: true                              # 自动创建 Collection，首次启动必须为 true

# --------------------------------------------------------------------------
# 五、MyBatis-Plus
# --------------------------------------------------------------------------
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true          # 数据库下划线字段自动映射为驼峰命名

# ============================================================================
# 六、AI Agent 行为配置
# ============================================================================
# 以下配置控制 Agent 的运行行为，一般使用默认值即可。
# 仅在需要调优时修改。
ai:
  agent:
    # ------ 6.1 LLM 提供商 ------
    # 本项目通过 OpenAI 兼容协议统一对接 DashScope / DeepSeek 等。
    # 具体的 API Key、地址、模型在 profile 文件中配置。
    llm:
      provider: ${AI_AGENT_LLM_PROVIDER:openai-compatible}

    # ------ 6.2 工具调用控制 ------
    # Agent 通过"工具"与数据库交互（查询用户、新增部门等）。
    tool:
      timeout-seconds: ${AI_AGENT_TOOL_TIMEOUT_SECONDS:10}  # 单次工具调用超时（秒）
      max-retries: ${AI_AGENT_TOOL_MAX_RETRIES:1}           # 工具调用失败后重试次数
      max-concurrent: ${AI_AGENT_TOOL_MAX_CONCURRENT:5}     # 最大并发工具调用数

    # ------ 6.3 对话记忆策略 ------
    # 控制 Agent 如何记住历史对话，防止上下文过长导致 Token 超限。
    # 可选策略：
    #   message-window  - 按消息条数滑窗，保留最近 N 条
    #   token-window    - 按 Token 数量滑窗（推荐，更精确）
    #   summary         - 超过阈值后自动摘要压缩
    memory:
      strategy: ${AI_AGENT_MEMORY_STRATEGY:token-window}
      message-window: ${AI_AGENT_MEMORY_MESSAGE_WINDOW:20}           # message-window 策略：保留最近 20 条消息
      max-tokens: ${AI_AGENT_MEMORY_MAX_TOKENS:8000}                 # token-window 策略：上下文最大 Token 数
      summary-threshold: ${AI_AGENT_MEMORY_SUMMARY_THRESHOLD:6000}   # summary 策略：超过此 Token 数触发摘要
      vector-top-k: ${AI_AGENT_MEMORY_VECTOR_TOP_K:5}                # 向量记忆召回条数
      vector-threshold: ${AI_AGENT_MEMORY_VECTOR_THRESHOLD:0.7}      # 向量记忆相似度阈值（0~1）

    # ------ 6.4 知识分层（L0/L1/L2/L3）------
    # Agent 通过多层知识体系增强回答能力：
    #   L0 知识片段 —— 将业务描述文件注入 Prompt（无需额外中间件）
    #   L1 Schema 感知 —— 自动读取数据库表结构和字段注释（需 MySQL）
    #   L2 安全 SQL —— Agent 自主构造 SELECT 查询（需 MySQL，多层安全防护）
    #   L3 全量 RAG —— 语义向量检索（需 Milvus）
    knowledge:
      # --- L0: 知识片段 ---
      snippet:
        enabled: ${AI_AGENT_KNOWLEDGE_SNIPPET_ENABLED:true}                       # 是否启用 L0 静态知识片段
        path: ${AI_AGENT_KNOWLEDGE_SNIPPET_PATH:classpath*:agent-knowledge/*.*}   # 知识文件路径，支持 .md/.txt

      # --- L1: Schema 自动发现 ---
      schema:
        enabled: ${AI_AGENT_KNOWLEDGE_SCHEMA_ENABLED:true}                        # 是否启用 L1 Schema 发现（需 MySQL）

      # --- L2: 安全 SQL 查询 ---
      sql:
        enabled: ${AI_AGENT_KNOWLEDGE_SQL_ENABLED:true}                           # 是否启用 L2 安全 SQL 工具（需 MySQL）
        allowed-tables: []                          # 表白名单（空=允许全部，设置后仅允许白名单中的表）
        denied-tables:                              # 表黑名单（优先于白名单）
          - sys_password
        denied-functions:                           # 禁止调用的 SQL 函数（防滥用）
          - sleep
          - load_file
        max-rows: ${AI_AGENT_SQL_MAX_ROWS:500}      # 单次查询最大返回行数
        max-scan-rows: ${AI_AGENT_SQL_MAX_SCAN_ROWS:100000}  # EXPLAIN 预估扫描行数上限
        explain-check: true                         # 执行前 EXPLAIN 检查（拒绝全表扫描）
        rate-limit: ${AI_AGENT_SQL_RATE_LIMIT:10}   # 每会话每分钟最大 SQL 执行次数
        timeout-seconds: ${AI_AGENT_SQL_TIMEOUT:5}  # SQL 查询超时（秒）
        mask-columns:                               # 查询结果脱敏字段列表
          - phone
          - id_card
          - email
        tenant-filter-enabled: false                # 是否自动注入租户过滤条件

      # --- L3: RAG 检索增强生成 ---
      rag:
        enabled: ${AI_AGENT_RAG_ENABLED:true}                    # 是否启用 RAG（需 Milvus）
        chunk-size: ${AI_AGENT_RAG_CHUNK_SIZE:400}               # 文档切分窗口大小（字符数）
        chunk-overlap: ${AI_AGENT_RAG_CHUNK_OVERLAP:80}          # 切分窗口重叠量
        top-k: ${AI_AGENT_RAG_TOP_K:8}                           # 初次检索返回候选数
        rerank-top-k: ${AI_AGENT_RAG_RERANK_TOP_K:5}             # 重排后保留片段数
        min-score: ${AI_AGENT_RAG_MIN_SCORE:0.05}                # 检索最低得分阈值
        max-context-chars: ${AI_AGENT_RAG_MAX_CONTEXT_CHARS:2200} # 注入 Prompt 的上下文最大字符数

    # ------ 6.5 向量同步 ------
    # 控制 MySQL → Milvus 的数据向量化同步行为。
    vector:
      sync:
        enabled: ${AI_AGENT_VECTOR_SYNC_ENABLED:true}            # 是否启用定时向量同步
        cron-expression: ${AI_AGENT_VECTOR_SYNC_CRON:0 */5 * * * *}  # 增量同步 cron（默认每 5 分钟）
        batch-size: ${AI_AGENT_VECTOR_SYNC_BATCH_SIZE:200}       # 每批次写入向量库的文档数

    # ------ 6.6 安全策略 ------
    # 控制写操作（新增/修改/删除）是否需要用户确认。
    # 设为 true 时，所有写操作会先展示给用户确认后才执行（推荐）。
    safety:
      write-need-confirm: ${AI_AGENT_WRITE_NEED_CONFIRM:true}

    # ------ 6.7 澄清对话 ------
    # 当用户意图不明确或参数不完整时，Agent 会主动追问。
    dialogue:
      clarification-enabled: ${AI_AGENT_CLARIFICATION_ENABLED:true}           # 是否开启澄清对话
      clarification-max-rounds: ${AI_AGENT_CLARIFICATION_MAX_ROUNDS:3}        # 最多追问轮数
      clarification-ask-batch-size: ${AI_AGENT_CLARIFICATION_ASK_BATCH_SIZE:2}  # 每轮最多追问问题数
      clarification-timeout-minutes: ${AI_AGENT_CLARIFICATION_TIMEOUT_MINUTES:10}  # 澄清超时（分钟），超时后放弃澄清

    # ClarificationPolicy 精细控制（与上方 dialogue 配合使用）
    clarification:
      max-rounds: ${AI_AGENT_CLARIFICATION_MAX_ROUNDS:3}
      ask-batch-size: ${AI_AGENT_CLARIFICATION_ASK_BATCH_SIZE:2}
      timeout-minutes: ${AI_AGENT_CLARIFICATION_TIMEOUT_MINUTES:10}
      on-max-rounds-exceeded: ${AI_AGENT_CLARIFICATION_ON_EXCEEDED:abort}     # abort / fallback

    # ------ 6.8 SSE 推送配置 ------
    # 前端通过 SSE（Server-Sent Events）实时接收 Agent 响应。
    sse:
      heartbeat-interval-seconds: ${AI_AGENT_SSE_HEARTBEAT_INTERVAL_SECONDS:15}  # 心跳间隔（秒），防止连接被中间件超时断开
