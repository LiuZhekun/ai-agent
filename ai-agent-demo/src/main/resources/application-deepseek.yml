# ============================================================================
# DeepSeek 专用配置
# ============================================================================
# 仅在启动时指定 --spring.profiles.active=deepseek 才会生效。
# 获取 API Key：https://platform.deepseek.com/
#
# 使用方式：
#   1. 设置环境变量  DEEPSEEK_API_KEY=sk-你的密钥
#   2. 启动时指定 profile:
#      mvn -pl ai-agent-demo -am spring-boot:run -Dspring-boot.run.profiles=deepseek
# ============================================================================

ai:
  agent:
    llm:
      provider: openai-compatible                # 统一走 OpenAI 兼容协议

spring:
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:}               # 通过环境变量注入，切勿明文写入仓库
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}
      chat:
        options:
          model: ${DEEPSEEK_MODEL:deepseek-chat}  # 可选模型：deepseek-chat / deepseek-reasoner

# DeepSeek 兼容端点默认不提供稳定的 embeddings 能力，
# 关闭依赖 embedding 的模块，避免启动时向量初始化报 404。
ai:
  agent:
    knowledge:
      rag:
        enabled: ${AI_AGENT_RAG_ENABLED:false}
    vector:
      sync:
        enabled: ${AI_AGENT_VECTOR_SYNC_ENABLED:false}
