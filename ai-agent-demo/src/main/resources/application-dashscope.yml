# ============================================================================
# DashScope（阿里通义千问）专用配置
# ============================================================================
# 仅在启动时指定 --spring.profiles.active=dashscope 才会生效。
# 获取 API Key：https://dashscope.console.aliyun.com/
#
# 使用方式：
#   1. 设置环境变量  DASHSCOPE_API_KEY=sk-你的密钥
#   2. 启动时指定 profile:
#      mvn -pl ai-agent-demo -am spring-boot:run -Dspring-boot.run.profiles=dashscope
# ============================================================================

ai:
  agent:
    llm:
      provider: openai-compatible                # 统一走 OpenAI 兼容协议

spring:
  http:
    client:
      # 复杂问题常伴随工具调用回填，LLM 二次生成耗时可能超过默认读取窗口。
      connect-timeout: ${AI_AGENT_LLM_CONNECT_TIMEOUT:5s}
      read-timeout: ${AI_AGENT_LLM_READ_TIMEOUT:60s}
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY:}              # 通过环境变量注入，切勿明文写入仓库
      # Spring AI OpenAI 客户端会追加 /v1 路径段，因此这里使用不带 /v1 的兼容根地址。
      base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      chat:
        options:
          model: ${DASHSCOPE_MODEL:qwen-plus}     # 可选模型：qwen-plus / qwen-max / qwen-turbo
      embedding:
        options:
          model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v2}
    vectorstore:
      milvus:
        # 与 text-embedding-v2 (1536维) 对齐，避免写入历史 1024 维集合时报错
        collection-name: ${MILVUS_COLLECTION:ai_agent_knowledge_1536}
        embedding-dimension: ${MILVUS_EMBEDDING_DIMENSION:1536}
